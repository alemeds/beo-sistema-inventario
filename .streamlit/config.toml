# 🏛️ Configuración de Streamlit para Sistema BEO
# Las credenciales y configuración de DB están en secrets.toml

[theme]
primaryColor = "#1f4e79"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor = "#262730"

[server]
maxUploadSize = 10
enableXsrfProtection = true
headless = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
